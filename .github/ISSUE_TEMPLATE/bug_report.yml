name: 🐞 Bug Report
description: Report a bug or unexpected behavior in Punishment
title: "[Bug]: "
labels: ["bug"]
assignees:
  - FuncZero

body:
  - type: markdown
    attributes:
      value: |
        ## 🐞 Bug Report

        Thank you for taking the time to report a bug in **Punishment**.
        Please fill out the form below with as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: 📌 Description
      description: Clearly describe the issue you encountered.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔁 Steps to Reproduce
      description: Provide step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Run the command...
        2. Perform action...
        3. Observe the error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
      description: What should have happened instead?
      placeholder: Describe the expected result.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 📦 Bot Version
      description: Specify the version of Punishment you are using.
      placeholder: e.g. v1.4.0

  - type: dropdown
    id: environment
    attributes:
      label: 🌐 Environment
      description: Where is the bot running?
      options:
        - Local (Development)
        - VPS / Dedicated Server
        - Hosting Service (e.g. Render, Replit, etc.)
        - Other
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 📄 Logs / Screenshots
      description: Provide relevant logs, error messages, or screenshots if available.
      placeholder: Paste logs or upload images here.

  - type: checkboxes
    id: checklist
    attributes:
      label: ✔️ Checklist
      options:
        - label: I am using the latest version of Punishment
          required: true
        - label: I have checked for existing issues
          required: true
        - label: I have provided all necessary information
          required: true
