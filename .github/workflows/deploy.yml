name: Deploy Punishment

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest

    steps:
      - name: Executando comandos via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Interrompe o script se qualquer comando falhar (Crucial para segurança)
            set -e

            # Navega até a pasta do bot
            cd ~/Punishment
            
            # Puxa as atualizações do GitHub de forma limpa
            git pull origin main
            
            # 'npm ci' é melhor que 'npm install' em CI/CD: 
            # Ele instala exatamente o que está no seu lockfile, sem alterar nada.
            npm ci --production
            
            # Reinicia o processo no PM2 garantindo que ele use as novas variáveis se houver
            pm2 restart punishment --update-env

            echo "Deploy do Punishment realizado com sucesso!"
            
