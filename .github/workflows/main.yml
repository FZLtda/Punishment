name: Punishment CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.x

jobs:
  quality:
    name: Quality & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Security audit (critical only)
        run: npm audit --audit-level=critical || true

      - name: Run ESLint
        run: npm run lint

      - name: Run Type Check
        run: npm run typecheck --if-present

      - name: Run Tests
        run: npm test

      - name: Build Project (optional)
        run: npm run build --if-present

  validate-structure:
    name: Validate Bot Structure
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run structural validation
        env:
          NODE_ENV: test
        run: npm run validate-structure

  deploy:
    name: Deploy Square Cloud
    needs: [quality, validate-structure]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment:
      name: ${{ github.ref_name }}
    env:
      APP_ID: ${{ github.ref == 'refs/heads/main' && secrets.SQUARE_APP_ID_MAIN || secrets.SQUARE_APP_ID_DEV }}
      TOKEN: ${{ github.ref == 'refs/heads/main' && secrets.SQUARE_TOKEN_MAIN || secrets.SQUARE_TOKEN_DEV }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deployment archive
        run: |
          zip -r app.zip . \
          -x "*.git*" \
          "node_modules/*" \
          ".github/*" \
          "*.md" \
          ".gitignore"

      - name: Validate package size
        run: |
          SIZE=$(stat -c%s app.zip)
          echo "Package size: $SIZE bytes"
          if [ $SIZE -lt 1000 ]; then
            echo "Package too small, aborting deploy"
            exit 1
          fi

      - name: Upload application
        run: |
          curl --fail --show-error \
          -X POST "https://api.squarecloud.app/v2/apps/$APP_ID/commit" \
          -H "Authorization: $TOKEN" \
          -F "file=@app.zip"

      - name: Wait deployment sync
        run: sleep 5

      - name: Restart application
        run: |
          curl --fail --show-error \
          -X POST "https://api.squarecloud.app/v2/apps/$APP_ID/restart" \
          -H "Authorization: $TOKEN"

      - name: Deployment success
        run: |
          echo "Deploy realizado com sucesso!"
          echo "Branch: ${{ github.ref_name }}"
          
