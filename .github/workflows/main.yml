name: Punishment - Expert CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- ETAPA 1: O INSPETOR (CI) ---
  build-and-test:
    name: Qualidade & Testes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 18.x, 20.x ]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Verificar Lint (Sintaxe)
        run: npm run lint --if-present

      - name: Rodar Testes Unitários
        run: npm test --if-present

  # --- ETAPA 2: O ENTREGADOR (CD) ---
  deploy:
    name: Deploy para VPS Hostinger
    needs: build-and-test # O DEPLOY SÓ COMEÇA SE OS TESTES PASSAREM!
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Executar comandos via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ~/Punishment
            git fetch origin main
            git reset --hard origin/main
            npm ci --production
            pm2 restart punishment --update-env
            echo "Deploy concluído com sucesso nível Expert!
